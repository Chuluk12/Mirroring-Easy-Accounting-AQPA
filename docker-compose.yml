version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easy-dashboard-backend
    ports:
      - "${EASY_BACKEND_PORT:-5000}:5000"
    environment:
      - EASY_DB_HOST=${EASY_DB_HOST:-192.168.10.5}
      - EASY_DB_PORT=${EASY_DB_PORT:-3999}
      - EASY_DB_PATH=${EASY_DB_PATH:-E:/EASY/AQPA.EASY6}
      - EASY_DB_USER=${EASY_DB_USER:-SYSDBA}
      - EASY_DB_PASSWORD=${EASY_DB_PASSWORD:-NewPassword123}
      - EASY_BACKEND_PORT=5000
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easy-dashboard-frontend
    ports:
      - "${FRONTEND_PORT:-4176}:5173"
    environment:
      - VITE_API_URL=http://localhost:${EASY_BACKEND_PORT:-5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend
